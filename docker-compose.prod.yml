# ===========================================
# Roboroça - Docker Compose (Produção)
# ===========================================
# Deploy: docker-compose -f docker-compose.prod.yml up -d --build
#
# Primeiro deploy (gerar certificado SSL):
#   1. Comentar o bloco server 443 no nginx.conf.template
#   2. docker compose -f docker-compose.prod.yml up -d nginx certbot
#   3. docker compose -f docker-compose.prod.yml run certbot certonly --webroot -w /var/www/certbot -d $DOMAIN
#   4. Descomentar o bloco 443 e restartar: docker compose -f docker-compose.prod.yml restart nginx

services:
  # -----------------
  # Nginx Reverse Proxy (SSL)
  # -----------------
  nginx:
    image: nginx:alpine
    container_name: roboroca-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx.conf.template:/etc/nginx/templates/default.conf.template:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_certs:/etc/letsencrypt:ro
    environment:
      - DOMAIN=${DOMAIN:-localhost}
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_started
      home:
        condition: service_started
      calculator:
        condition: service_started
      precision:
        condition: service_started
      equipment:
        condition: service_started
      spectral:
        condition: service_started
    restart: always
    networks:
      - roboroca-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -----------------
  # Certbot (Let's Encrypt)
  # -----------------
  certbot:
    image: certbot/certbot
    container_name: roboroca-certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_certs:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot; sleep 12h; done'"
    networks:
      - roboroca-network

  # -----------------
  # Frontend (Next.js)
  # -----------------
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-/api/v1}
    container_name: roboroca-frontend
    environment:
      - NODE_ENV=production
    restart: always
    networks:
      - roboroca-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -----------------
  # Satellite: Home (roboroca.com)
  # -----------------
  home:
    build:
      context: ../roboroca-home
      dockerfile: ../Roboroça/docker/Dockerfile.satellite
      args:
        APP_DIR: .
        NEXT_PUBLIC_API_URL: https://api.${DOMAIN:-roboroca.com}/api/v1
    container_name: roboroca-home
    environment:
      - NODE_ENV=production
    restart: always
    networks:
      - roboroca-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -----------------
  # Satellite: Calculator (calc.roboroca.com)
  # -----------------
  calculator:
    build:
      context: ../roboroca-calculator
      dockerfile: ../Roboroça/docker/Dockerfile.satellite
      args:
        APP_DIR: .
        NEXT_PUBLIC_API_URL: https://api.${DOMAIN:-roboroca.com}/api/v1
    container_name: roboroca-calculator
    environment:
      - NODE_ENV=production
    restart: always
    networks:
      - roboroca-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -----------------
  # Satellite: Precision (precision.roboroca.com)
  # -----------------
  precision:
    build:
      context: ../roboroca-precision
      dockerfile: ../Roboroça/docker/Dockerfile.satellite
      args:
        APP_DIR: .
        NEXT_PUBLIC_API_URL: https://api.${DOMAIN:-roboroca.com}/api/v1
    container_name: roboroca-precision
    environment:
      - NODE_ENV=production
    restart: always
    networks:
      - roboroca-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -----------------
  # Satellite: Equipment (equipment.roboroca.com)
  # -----------------
  equipment:
    build:
      context: ../roboroca-equipment
      dockerfile: ../Roboroça/docker/Dockerfile.satellite
      args:
        APP_DIR: .
        NEXT_PUBLIC_API_URL: https://api.${DOMAIN:-roboroca.com}/api/v1
    container_name: roboroca-equipment
    environment:
      - NODE_ENV=production
    restart: always
    networks:
      - roboroca-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -----------------
  # Satellite: Spectral (spectral.roboroca.com)
  # -----------------
  spectral:
    build:
      context: ../roboroca-spectral
      dockerfile: ../Roboroça/docker/Dockerfile.satellite
      args:
        APP_DIR: .
        NEXT_PUBLIC_API_URL: https://api.${DOMAIN:-roboroca.com}/api/v1
    container_name: roboroca-spectral
    environment:
      - NODE_ENV=production
    restart: always
    networks:
      - roboroca-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3

  # -----------------
  # Backend API (Gunicorn + Uvicorn workers)
  # -----------------
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: roboroca-backend
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-roboroca}:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@db:5432/${POSTGRES_DB:-roboroca}
      - SECRET_KEY=${SECRET_KEY}
      - ENVIRONMENT=production
      - FRONTEND_URL=${FRONTEND_URL:-https://localhost}
      - CORS_ORIGINS=${CORS_ORIGINS:-}
      - REDIS_URL=redis://redis:6379/0
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM_EMAIL=${SMTP_FROM_EMAIL:-noreply@roboroca.com.br}
      - SMTP_FROM_NAME=${SMTP_FROM_NAME:-Roboroca}
      - SMTP_USE_TLS=${SMTP_USE_TLS:-true}
    volumes:
      - uploads_data:/app/uploads
      - ml_models_data:/app/ml_models
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: always
    networks:
      - roboroca-network

  # -----------------
  # Redis (JWT blacklist, cache, rate limiting)
  # -----------------
  redis:
    image: redis:7-alpine
    container_name: roboroca-redis
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: always
    networks:
      - roboroca-network

  # -----------------
  # PostgreSQL + PostGIS
  # -----------------
  db:
    image: postgis/postgis:16-3.4
    container_name: roboroca-db
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-roboroca}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      - POSTGRES_DB=${POSTGRES_DB:-roboroca}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backup:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-roboroca} -d ${POSTGRES_DB:-roboroca}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - roboroca-network

volumes:
  postgres_data:
  postgres_backup:
  uploads_data:
  ml_models_data:
  certbot_www:
  certbot_certs:
  redis_data:

networks:
  roboroca-network:
    driver: bridge
